<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Electric Background</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #03070f; overflow: hidden; width: 100vw; height: 100vh; }
    canvas { display: block; }
    .demo-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(0, 210, 255, 0.15);
      font-family: 'Courier New', monospace;
      font-size: 72px;
      font-weight: bold;
      letter-spacing: 12px;
      text-transform: uppercase;
      pointer-events: none;
      user-select: none;
      text-shadow: 0 0 40px rgba(0, 210, 255, 0.3);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="demo-text">SYSTEM</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let W = canvas.width = window.innerWidth;
    let H = canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      initStreams();
    });

    // ─── Electric Stream (vertical straight line flowing down) ────────────────
    class Stream {
      constructor(x) {
        this.x = x;
        this.reset();
      }

      reset() {
        // head and tail define the visible segment
        // stagger start positions to avoid all resetting at once
        this.headY = -(40 + Math.random() * 200);  // shorter stagger range
        this.targetLength = 80 + Math.random() * 220;  // final trail length
        this.length = 30;  // start a bit longer
        this.lengthGrowth = 1.5;  // slower, steady growth
        this.tailY = this.headY - this.length;
        // ~20% chance of a fast "burst" stream
        const isBurst = Math.random() < 0.2;
        this.speed = isBurst ? 10 + Math.random() * 6 : 3.0 + Math.random() * 5.0;
        // clean tech palette: cyan, teal, electric blue, violet
        const palette = [185, 195, 210, 270];
        this.hue = palette[Math.floor(Math.random() * palette.length)]
                   + Math.floor(Math.random() * 10) - 5; // slight variation
        this.alpha = 0.7 + Math.random() * 0.3;  // fixed alpha, no flicker
        this.width = 1 + Math.random() * 1.5;
      }

      update() {
        this.headY += this.speed;
        // gradually extend length with easing
        if (this.length < this.targetLength) {
          const remaining = this.targetLength - this.length;
          this.length += Math.min(remaining * 0.05 + 0.5, this.lengthGrowth);
        }
        this.tailY = this.headY - this.length;
        // recycle once fully off screen
        if (this.tailY > H + 20) this.reset();
      }

      draw() {
        const visTop = Math.max(0, this.tailY);
        const visBot = Math.min(H, this.headY);
        if (visBot <= visTop) return;

        const alpha = this.alpha;

        // gradient: transparent at tail, bright at head
        const grad = ctx.createLinearGradient(this.x, visTop, this.x, visBot);
        grad.addColorStop(0, `hsla(${this.hue}, 100%, 70%, 0)`);
        grad.addColorStop(0.3, `hsla(${this.hue}, 100%, 65%, ${alpha * 0.3})`);
        grad.addColorStop(0.7, `hsla(${this.hue}, 100%, 70%, ${alpha * 0.7})`);
        grad.addColorStop(1, `hsla(${this.hue}, 100%, 90%, ${alpha})`);

        ctx.save();

        // outer glow
        ctx.strokeStyle = grad;
        ctx.lineWidth = this.width + 2;
        ctx.shadowBlur = 20;
        ctx.shadowColor = `hsl(${this.hue}, 100%, 60%)`;
        ctx.beginPath();
        ctx.moveTo(this.x, visTop);
        ctx.lineTo(this.x, visBot);
        ctx.stroke();

        // bright core — fade out at tail too
        const coreGrad = ctx.createLinearGradient(this.x, visTop, this.x, visBot);
        coreGrad.addColorStop(0, `rgba(220, 245, 255, 0)`);
        coreGrad.addColorStop(0.5, `rgba(220, 245, 255, ${alpha * 0.5})`);
        coreGrad.addColorStop(1, `rgba(220, 245, 255, ${alpha * 0.9})`);
        ctx.strokeStyle = coreGrad;
        ctx.lineWidth = this.width * 0.4;
        ctx.shadowBlur = 4;
        ctx.shadowColor = '#ffffff';
        ctx.beginPath();
        ctx.moveTo(this.x, visTop);
        ctx.lineTo(this.x, visBot);
        ctx.stroke();

        // bright tip dot
        ctx.shadowBlur = 24;
        ctx.shadowColor = `hsl(${this.hue}, 100%, 80%)`;
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.beginPath();
        ctx.arc(this.x, Math.min(this.headY, H - 1), this.width * 1.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }
    }

    // ─── Grid ─────────────────────────────────────────────────────────────────
    function drawGrid() {
      ctx.save();
      ctx.strokeStyle = 'rgba(0, 160, 220, 0.055)';
      ctx.lineWidth = 0.5;
      const gx = 60, gy = 60;
      for (let x = 0; x < W; x += gx) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y < H; y += gy) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }
      ctx.restore();
    }

    // ─── Star Flicker ─────────────────────────────────────────────────────────
    class Star {
      constructor() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.alpha = 0;
        this.fadeIn = true;
        this.maxAlpha = 0.4 + Math.random() * 0.5;
        this.fadeSpeed = 0.01 + Math.random() * 0.02;
        this.size = 0.8 + Math.random() * 1.2;
        this.hue = 180 + Math.random() * 40; // cyan-ish
      }

      update() {
        if (this.fadeIn) {
          this.alpha += this.fadeSpeed;
          if (this.alpha >= this.maxAlpha) {
            this.alpha = this.maxAlpha;
            this.fadeIn = false;
          }
        } else {
          this.alpha -= this.fadeSpeed * 0.6;
          if (this.alpha <= 0) {
            this.alpha = 0;
            // reposition for next flicker
            this.x = Math.random() * W;
            this.y = Math.random() * H;
            this.fadeIn = true;
            this.maxAlpha = 0.3 + Math.random() * 0.4;
          }
        }
      }

      draw() {
        if (this.alpha <= 0.01) return;
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = `hsl(${this.hue}, 70%, 80%)`;
        ctx.shadowBlur = 8;
        ctx.shadowColor = `hsl(${this.hue}, 80%, 70%)`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ─── Init streams spread across columns ───────────────────────────────────
    let streams = [];
    let stars = [];

    function initStreams() {
      const cols = Math.max(1, Math.floor(W / 260) - 2);  // two less streams
      streams = [];
      for (let i = 0; i < cols; i++) {
        const x = (i + 0.5) * (W / cols) + (Math.random() - 0.5) * 14;
        streams.push(new Stream(x));
      }

      // sparse stars: roughly 1 per 180000 square pixels
      const starCount = Math.floor((W * H) / 180000);
      stars = [];
      for (let i = 0; i < starCount; i++) {
        stars.push(new Star());
      }
    }

    initStreams();

    // ─── Main loop ────────────────────────────────────────────────────────────
    function frame() {
      requestAnimationFrame(frame);

      ctx.fillStyle = 'rgba(3, 7, 15, 0.3)';
      ctx.fillRect(0, 0, W, H);

      drawGrid();

      stars.forEach(s => { s.update(); s.draw(); });
      streams.forEach(s => { s.update(); s.draw(); });
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
